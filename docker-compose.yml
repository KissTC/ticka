version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticka_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ticka_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ticka_secure_password}
      POSTGRES_DB: ${DB_NAME:-ticka_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ticka_user} -d ${DB_NAME:-ticka_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticka_backend
    restart: always
    ports:
      - "${PORT:-8082}:${PORT:-8082}"
    environment:
      - PORT=${PORT:-8082}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-ticka_user}
      - DB_PASSWORD=${DB_PASSWORD:-ticka_secure_password}
      - DB_NAME=${DB_NAME:-ticka_db}
      - DB_SSLMODE=disable
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_CDN_URL=${S3_CDN_URL}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY}
      - STRIPE_PRICE_ID_YEARLY=${STRIPE_PRICE_ID_YEARLY}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ticka_network

volumes:
  postgres_data:

networks:
  ticka_network:
    driver: bridge
