version: '3.8'

# Despliegue de producción para el VPS: db + backend + Caddy (reverse proxy con HTTPS automático).
# El frontend (Next.js) se despliega por separado en Vercel.
#
# Uso:
#   cp .env.production.example .env
#   # llenar .env con los valores reales
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:15-alpine
    container_name: ticka_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Sin "ports:" — la base de datos solo es accesible dentro de la red interna de Docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ticka_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticka_backend
    restart: always
    # Sin "ports:" — Caddy es el único punto de entrada público; se comunica con el backend
    # a través de la red interna de Docker usando el nombre de servicio "backend"
    environment:
      - PORT=8082
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - S3_CDN_URL=${S3_CDN_URL}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID_MONTHLY=${STRIPE_PRICE_ID_MONTHLY}
      - STRIPE_PRICE_ID_YEARLY=${STRIPE_PRICE_ID_YEARLY}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ticka_network

  caddy:
    image: caddy:2-alpine
    container_name: ticka_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - ticka_network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  ticka_network:
    driver: bridge
